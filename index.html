<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Translation App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="card">

  <!-- Language Selector Row -->
  <div class="lang-bar">
    <div class="lang-select-wrap">
      <select id="sourceLang">
        <option value="auto" selected>Detect Language</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ar">Arabic</option>
      </select>
    </div>

    <div class="lang-select-wrap" style="max-width:130px;">
      <select id="sourceLang2">
        <option value="en" selected>English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ar">Arabic</option>
      </select>
    </div>

    <button class="swap-btn" id="swapBtn" title="Swap languages">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 16V4m0 0L3 8m4-4 4 4M17 8v12m0 0 4-4m-4 4-4-4"/>
      </svg>
    </button>

    <div class="lang-select-wrap" style="max-width:130px;">
      <select id="targetLang">
        <option value="fr" selected>French</option>
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ar">Arabic</option>
      </select>
    </div>
  </div>

  <!-- Text Panels -->
  <div class="panels">
    <div class="panel">
      <div class="panel-label">Input</div>
      <textarea id="inputText" placeholder="Type something…" maxlength="500"></textarea>
      <div class="panel-footer">
        <div class="panel-actions">
          <button class="icon-btn" id="listenInputBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            Listen
          </button>
          <button class="icon-btn" id="copyInputBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
        </div>
        <span class="char-count" id="charCount">16/500</span>
      </div>
    </div>

    <div class="panel-divider"></div>

    <div class="panel">
      <div class="panel-label">Output</div>
      <div class="output-text" id="outputText">Bonjour, comment allez-vous</div>
      <div class="panel-footer">
        <div class="panel-actions">
          <button class="icon-btn" id="listenOutputBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            Listen
          </button>
          <button class="icon-btn" id="copyOutputBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="notice" id="notice"></div>

  <div class="bottom-bar">
    <button class="translate-btn" id="translateBtn">
      <span class="btn-loader"></span>
      <span>Translate</span>
    </button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
